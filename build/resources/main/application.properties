spring.application.name=guess
# Railway/Render 등
server.port=${PORT:8080}

# 개발: 템플릿 캐시 끄기 (배포는 prod 프로필에서 켜기 권장)
spring.thymeleaf.cache=false

# 대용량 이미지·동영상 첨부
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=1GB

# --- Vertex (ksyoon03/backend 연동) — 배포·GCP 쓸 때. 로컬만 띄울 땐 아래 exclude 주석을 해제.
spring.ai.vertex.ai.gemini.project-id=howmuch-494401
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-pro

# 로컬에서 GCP 없이 띄울 때(스텁만):
